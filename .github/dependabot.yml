version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      groups:
          npm:
              patterns:
                  - "*"
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
    - package-ecosystem: "pip"
      directory: "/"
      schedule:
          interval: "monthly"
      groups:
          pip:
              patterns:
                  - "*"
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
      groups:
          github-actions:
              patterns:
                  - "*"
